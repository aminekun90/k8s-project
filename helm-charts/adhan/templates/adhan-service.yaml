apiVersion: v1
kind: Service
metadata:
  name: adhan-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: adhan-api
spec:
  type: {{ .Values.service.type }}
  selector:
    app: adhan-api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8000
  {{- with .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
