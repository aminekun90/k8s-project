replicaCount: 1

image:
  repository: aminekun90/adhan-api
  # Mutable tag so the cluster always runs the newest build. deploy.sh /
  # the app CI pushes both <version> and latest.
  tag: latest
  pullPolicy: Always

# OTA auto-update via Keel (https://keel.sh): Keel polls Docker Hub and
# redeploys this Deployment whenever the :latest digest changes — no manual
# rollout, no inbound port (poll, not webhook — NAT-friendly). Install Keel
# once on the cluster (deploy.sh does it).
keel:
  enabled: true
  # force = update on digest change of a mutable tag (latest).
  policy: force
  pollSchedule: "@every 1m"
  # approvals > 0 holds new images as a *pending approval* instead of deploying
  # them. The Adhan app surfaces it and approves it from its own UI (About
  # dialog). Set to 0 for fully automatic updates.
  approvals: 1
  # In-cluster Keel admin API the app proxies to approve updates.
  url: http://keel.keel.svc.cluster.local:9300

# hostNetwork is required for Sonos (SSDP) and Freebox (mDNS) LAN discovery.
hostNetwork: true
# When hostNetwork is on, keep cluster DNS working inside the pod.
dnsPolicy: ClusterFirstWithHostNet

timezone: Europe/Paris

# Pin the pod to the Pi that physically has the speakers/sound card, the
# Bluetooth adapter, and the node-local data hostPath below. Required on any
# multi-node cluster (otherwise the pod can schedule on a node without the
# audio hardware, off the speakers' LAN segment, or away from its data);
# harmless on a single-node cluster. Example:
#   nodeSelector: { kubernetes.io/hostname: raspberrypi }
nodeSelector: {}

# Persisted app data (prayer DB, Freebox token) on the node. Node-local
# hostPath: it only survives reschedules onto the SAME node, so set
# nodeSelector above to keep the pod (and its data) on one Pi.
dataPath: /home/pi/data

# Mount the host sound card so the "Cet appareil" device plays the adhan
# on the Pi itself (needs a privileged container). Disable if you only use
# Sonos / Freebox / Bluetooth.
audio:
  enabled: true
  devicePath: /dev/snd

# Bluetooth speakers: the container's bluetoothctl drives the HOST's bluetoothd
# over the system D-Bus. Requires a BT adapter + bluetoothd running on the Pi.
# Implies a privileged container (already set when audio is enabled).
bluetooth:
  enabled: false
  dbusPath: /var/run/dbus

service:
  type: LoadBalancer
  port: 8000
  # Optional fixed IP. Must be inside the MetalLB pool (192.168.1.42-44);
  # leave empty to auto-assign (.42 and .44 are used by Pi-hole, so .43 is free).
  loadBalancerIP: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 256Mi
