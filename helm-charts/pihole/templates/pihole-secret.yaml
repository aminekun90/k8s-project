{{- /*
Create the admin-password Secret only when the user has NOT supplied an
existing one. Keeping it as a Secret (not a plain env in values) follows the
repo convention of never embedding credentials in values.yaml.
*/ -}}
{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-admin
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  password: {{ required "Set .Values.adminPassword or .Values.existingSecret" .Values.adminPassword | quote }}
{{- end }}
