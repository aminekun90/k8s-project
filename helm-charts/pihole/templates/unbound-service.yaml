# templates/unbound-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: unbound
spec:
  type: ClusterIP
  # Pinned so Pi-hole's upstream (upstreamDns) can target a stable IP and never
  # needs DNS-to-resolve-DNS at dnsmasq startup. Keep in sync with upstreamDns.
  clusterIP: 10.43.110.126
  selector:
    app: unbound
  ports:
    - name: dns-udp
      port: {{ .Values.unbound.port }}
      targetPort: {{ .Values.unbound.port }}
      protocol: UDP
    - name: dns-tcp
      port: {{ .Values.unbound.port }}
      targetPort: {{ .Values.unbound.port }}
      protocol: TCP