{{- range .Values.localApps }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .host | replace "." "-" }}
  namespace: {{ .namespace }}
spec:
  ingressClassName: {{ $.Values.ingressClassName | default "traefik" }}
  rules:
    - host: {{ .host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .service }}
                port:
                  number: {{ .port }}
{{- end }}
