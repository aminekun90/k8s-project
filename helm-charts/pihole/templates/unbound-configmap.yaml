apiVersion: v1
kind: ConfigMap
metadata:
  name: unbound-config
  namespace: {{ .Release.Namespace }}
data:
  custom.conf: |
    server:
      interface: 0.0.0.0
      port: 5335

      # Allow queries from the k3s pod/service CIDRs (Pi-hole runs as a pod).
      access-control: 127.0.0.0/8 allow
      access-control: 10.0.0.0/8 allow

      verbosity: 0

      do-ip4: yes
      do-ip6: no
      do-udp: yes
      do-tcp: yes

      harden-glue: yes
      harden-dnssec-stripped: yes
      use-caps-for-id: yes

      edns-buffer-size: 1232
      prefetch: yes
      prefetch-key: yes

      num-threads: 1

      so-rcvbuf: 0
      so-sndbuf: 0

      hide-identity: yes
      hide-version: yes

      rrset-roundrobin: yes
      minimal-responses: yes

      cache-min-ttl: 300
      cache-max-ttl: 86400