# templates/pihole-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
            - containerPort: 80
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-admin" .Release.Name) }}
                  key: {{ .Values.existingSecretKey }}
            # Pi-hole v6 config keys (replace the deprecated v5 ServerIP/DNS1/DNS2/DNSMASQ_LISTENING).
            - name: FTLCONF_dns_upstreams
              value: {{ .Values.upstreamDns | quote }}
            - name: FTLCONF_dns_listeningMode
              value: "all"
          volumeMounts:
            - name: data
              mountPath: /etc/pihole
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          resources:
{{ toYaml .Values.resources.pihole | indent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pihole-data