# templates/pihole-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      {{- if .Values.dhcp.enabled }}
      # DHCP serves clients directly via L2 broadcast, which needs host network.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
            - containerPort: 80
            {{- if .Values.dhcp.enabled }}
            - containerPort: 67
              protocol: UDP
            {{- end }}
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-admin" .Release.Name) }}
                  key: {{ .Values.existingSecretKey }}
            # Pi-hole v6 config keys (replace the deprecated v5 ServerIP/DNS1/DNS2/DNSMASQ_LISTENING).
            - name: FTLCONF_dns_upstreams
              value: {{ .Values.upstreamDns | quote }}
            - name: FTLCONF_dns_listeningMode
              value: "all"
            {{- if .Values.localApps }}
            # Let Pi-hole load custom records from /etc/dnsmasq.d (local DNS).
            - name: FTLCONF_misc_etc_dnsmasq_d
              value: "true"
            # Pi-hole hardcodes "pi.hole" to its own (pod) IP; force it to the
            # LAN ingress IP so the admin UI is reachable by hostname.
            - name: FTLCONF_dns_reply_host_force4
              value: "true"
            - name: FTLCONF_dns_reply_host_IPv4
              value: {{ .Values.lanIngressIP | quote }}
            {{- end }}
            {{- if .Values.dhcp.enabled }}
            # Built-in DHCP server — the universal way to push Pi-hole as DNS to
            # every device when the router/ISP box can't set a custom DNS.
            # Disable the router's own DHCP first to avoid two DHCP servers.
            - name: FTLCONF_dhcp_active
              value: "true"
            - name: FTLCONF_dhcp_start
              value: {{ .Values.dhcp.start | quote }}
            - name: FTLCONF_dhcp_end
              value: {{ .Values.dhcp.end | quote }}
            - name: FTLCONF_dhcp_router
              value: {{ .Values.dhcp.router | quote }}
            - name: FTLCONF_dhcp_leaseTime
              value: {{ .Values.dhcp.leaseTime | quote }}
            - name: FTLCONF_dhcp_ipv6
              value: {{ .Values.dhcp.ipv6 | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /etc/pihole
            {{- if .Values.localApps }}
            - name: local-dns
              mountPath: /etc/dnsmasq.d/02-local-dns.conf
              subPath: 02-local-dns.conf
            {{- end }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          resources:
{{ toYaml .Values.resources.pihole | indent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pihole-data
        {{- if .Values.localApps }}
        - name: local-dns
          configMap:
            name: pihole-local-dns
        {{- end }}