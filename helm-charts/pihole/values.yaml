replicaCount: 1

image:
  repository: pihole/pihole
  tag: "2026.06.0"
  pullPolicy: IfNotPresent

timezone: Europe/Paris

# Admin password handling (kept out of git, not lost on upgrade).
# Two options:
#   A) Reference a Secret you create once (recommended — survives any upgrade):
#        kubectl -n pihole create secret generic pihole-admin --from-literal=password='YOURPASS'
#      then set: existingSecret: pihole-admin
#   B) Let the chart create the Secret from `adminPassword`. Don't commit the
#      real value — pass it at install time, e.g.:
#        helm upgrade --install pihole ./helm-charts/pihole -n pihole --set adminPassword='YOURPASS'
adminPassword: ""
existingSecret: ""        # name of a pre-created Secret holding the password
existingSecretKey: password
# Upstream resolver(s) for Pi-hole v6 (replaces the deprecated DNS1/DNS2 envs).
upstreamDns: unbound.pihole.svc.cluster.local#5335

# Optional: let Pi-hole be the LAN DHCP server. This is the universal way to
# push Pi-hole as DNS to every device when the router/ISP box can't set a
# custom DNS (works behind any FAI/router worldwide).
# IMPORTANT: disable the router's own DHCP first, and note this forces
# hostNetwork on the Pi-hole pod (it must see L2 DHCP broadcasts).
dhcp:
  enabled: false
  start: 192.168.1.100      # first IP to hand out
  end: 192.168.1.200        # last IP to hand out
  router: 192.168.1.254     # the gateway (your ISP box)
  leaseTime: 24h
  ipv6: "false"

service:
  web:
    # NodePort, not LoadBalancer: the MetalLB pool is shared with traefik/adhan
    # and the cluster also runs k3s klipper ServiceLB — a web LoadBalancer IP
    # collides. Admin UI is reached at http://192.168.1.42:30080/admin.
    type: NodePort
    nodePort: 30080
    port: 80
  dns:
    type: LoadBalancer
    loadBalancerIP: 192.168.1.44
    port: 53

persistence:
  enabled: true
  storageClass: local-path
  size: 2Gi

resources:
  pihole:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi
  unbound:
    requests:
      memory: 64Mi
    limits:
      memory: 256Mi

unbound:
  image: klutchell/unbound:1.25.1
  port: 5335