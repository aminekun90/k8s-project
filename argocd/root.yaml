# App-of-Apps: installs EVERYTHING. This root Application watches argocd/apps/
# and registers every child Application found there (pihole, adhan, increaser).
# Apply this only if you want all components. For a selective install, use
# deploy.sh (it applies just the chosen argocd/apps/*.yaml). Child apps auto-sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/aminekun90/k8s-project.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
