apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: increaser
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aminekun90/k8s-project.git
    targetRevision: main
    path: helm-charts/increaser
  destination:
    server: https://kubernetes.default.svc
    namespace: increaser
  # Manual sync: review the diff in the UI, then click Sync.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
