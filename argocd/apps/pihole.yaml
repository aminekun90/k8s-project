apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aminekun90/k8s-project.git
    targetRevision: main
    path: helm-charts/pihole
    helm:
      parameters:
        # Password lives in a pre-created Secret (deploy.sh), not in git.
        - name: existingSecret
          value: pihole-admin
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole
  # Manual sync: review the diff in the UI, then click Sync.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
