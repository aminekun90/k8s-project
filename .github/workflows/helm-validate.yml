name: Validate Helm charts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.3

      - name: Lint charts
        run: |
          helm lint helm-charts/adhan
          helm lint helm-charts/pihole --set adminPassword=ci-dummy

      - name: Render templates (must succeed)
        run: |
          helm template adhan helm-charts/adhan -n adhan > /dev/null
          helm template pihole helm-charts/pihole -n pihole --set adminPassword=ci-dummy > /dev/null
          # Also exercise the optional Pi-hole DHCP path.
          helm template pihole helm-charts/pihole -n pihole \
            --set adminPassword=ci-dummy --set dhcp.enabled=true > /dev/null

      - name: Validate manifests against the Kubernetes schema
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          for chart in adhan pihole; do
            args=""
            [ "$chart" = "pihole" ] && args="--set adminPassword=ci-dummy"
            helm template "$chart" "helm-charts/$chart" -n "$chart" $args \
              | /tmp/kubeconform -strict -ignore-missing-schemas -summary
          done
