# Host dnsmasq config for the k3s node — IPv6 DNS path to Pi-hole.
#
# The cluster is single-stack IPv4, so Pi-hole has no IPv6 and k3s servicelb
# holds the IPv4 hostPort 53. This host dnsmasq (systemd `dnsmasq.service`)
# already listens on the node's IPv6 ([::]:53); we just point it at Pi-hole so
# IPv6 DNS gets ad-filtering + `.home` records. The Freebox then advertises this
# node's IPv6 as the LAN's custom IPv6 DNS (Config IPv6 -> force custom DNS).
#
# Install on the node:
#   sudo cp node-dns/dnsmasq-pihole-forward.conf /etc/dnsmasq.d/pihole.conf
#   sudo systemctl restart dnsmasq
#
# Verify (NODE6 = the node's global IPv6):
#   nslookup aladhan.home  $NODE6   # -> 192.168.1.43
#   nslookup doubleclick.net $NODE6 # -> 0.0.0.0 / :: (blocked)

no-resolv
server=192.168.1.44
